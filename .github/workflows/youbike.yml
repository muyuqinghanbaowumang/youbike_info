name: YouBike Data Scraper

on:
  schedule:
    - cron: "*/10 21-23,0-1,5-20 * * *"
  workflow_dispatch: 

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: |
        pip install requests

    - name: Run scraper
      run: |
        python parkinginfo.py

        - name: Commit and push data
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        git config --global user.name "github-actions"
        git config --global user.email "github-actions@github.com"
        git add data/youbike_zhongli.csv
        git commit -m "Update YouBike data at $(date)" || echo "No changes to commit"
        git push

